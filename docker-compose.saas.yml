services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: verane_saas
      POSTGRES_USER: verane_saas
      POSTGRES_PASSWORD: verane_saas_dev
    ports:
      - "55432:5432"
    volumes:
      - pgdata_saas:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verane_saas -d verane_saas"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://verane_saas:verane_saas_dev@db:5432/verane_saas
      SAAS_ENV: local
      SAAS_JWT_SECRET: change-me-local-saas-secret
      SAAS_JWT_ISSUER: scentra-ai
      SAAS_CORS_ORIGINS: http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:3000,http://127.0.0.1:3000
      SCENTRA_META_ACCESS_TOKEN: ${SCENTRA_META_ACCESS_TOKEN:-}
      SCENTRA_META_GRAPH_VERSION: ${SCENTRA_META_GRAPH_VERSION:-v22.0}
      SCENTRA_META_TIMEOUT_SEC: ${SCENTRA_META_TIMEOUT_SEC:-15}
    ports:
      - "8010:8000"

  migrate:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://verane_saas:verane_saas_dev@db:5432/verane_saas
      SAAS_ENV: local
      SAAS_JWT_SECRET: change-me-local-saas-secret
      SAAS_JWT_ISSUER: scentra-ai
      SAAS_MIGRATION_PROFILE: core
    volumes:
      - ./migrations:/migrations:ro
    command: ["python", "-m", "app_saas.tools.migrate", "/migrations"]

  worker:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg2://verane_saas:verane_saas_dev@db:5432/verane_saas
      SAAS_ENV: local
      SAAS_JWT_SECRET: change-me-local-saas-secret
      SAAS_JWT_ISSUER: scentra-ai
      SAAS_WORKER_NAME: worker-local
      SCENTRA_META_ACCESS_TOKEN: ${SCENTRA_META_ACCESS_TOKEN:-}
      SCENTRA_META_GRAPH_VERSION: ${SCENTRA_META_GRAPH_VERSION:-v22.0}
      SCENTRA_META_TIMEOUT_SEC: ${SCENTRA_META_TIMEOUT_SEC:-15}
    command: ["python", "-m", "app_saas.workers.runner"]

volumes:
  pgdata_saas: {}
