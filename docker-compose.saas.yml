services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scentra_saas}
      POSTGRES_USER: ${POSTGRES_USER:-scentra_saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scentra_saas_dev}
    ports:
      - "127.0.0.1:${SAAS_DB_HOST_PORT:-55432}:5432"
    volumes:
      - pgdata_saas:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scentra_saas} -d ${POSTGRES_DB:-scentra_saas}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-scentra_saas}:${POSTGRES_PASSWORD:-scentra_saas_dev}@db:5432/${POSTGRES_DB:-scentra_saas}}
      SAAS_ENV: ${SAAS_ENV:-local}
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-change-me-local-saas-secret}
      SAAS_JWT_ISSUER: ${SAAS_JWT_ISSUER:-scentra-ai}
      SAAS_ACCESS_TOKEN_MINUTES: ${SAAS_ACCESS_TOKEN_MINUTES:-15}
      SAAS_REFRESH_TOKEN_DAYS: ${SAAS_REFRESH_TOKEN_DAYS:-15}
      SAAS_CORS_ORIGINS: ${SAAS_CORS_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174,http://localhost:5175,http://127.0.0.1:5175,http://localhost:3000,http://127.0.0.1:3000}
      SAAS_TRIAL_DAYS: ${SAAS_TRIAL_DAYS:-30}
      SAAS_TRIAL_PLAN_CODE: ${SAAS_TRIAL_PLAN_CODE:-starter}
      SCENTRA_META_ACCESS_TOKEN: ${SCENTRA_META_ACCESS_TOKEN:-}
      SCENTRA_WHATSAPP_BUSINESS_ACCOUNT_ID: ${SCENTRA_WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      SCENTRA_META_GRAPH_VERSION: ${SCENTRA_META_GRAPH_VERSION:-v22.0}
      SCENTRA_META_TIMEOUT_SEC: ${SCENTRA_META_TIMEOUT_SEC:-15}
    ports:
      - "127.0.0.1:${SAAS_API_HOST_PORT:-8010}:8000"

  migrate:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-scentra_saas}:${POSTGRES_PASSWORD:-scentra_saas_dev}@db:5432/${POSTGRES_DB:-scentra_saas}}
      SAAS_ENV: ${SAAS_ENV:-local}
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-change-me-local-saas-secret}
      SAAS_JWT_ISSUER: ${SAAS_JWT_ISSUER:-scentra-ai}
      SAAS_TRIAL_DAYS: ${SAAS_TRIAL_DAYS:-30}
      SAAS_TRIAL_PLAN_CODE: ${SAAS_TRIAL_PLAN_CODE:-starter}
      SAAS_MIGRATION_PROFILE: ${SAAS_MIGRATION_PROFILE:-core}
    volumes:
      - ./migrations:/migrations:ro
    command: ["python", "-m", "app_saas.tools.migrate", "/migrations"]

  worker:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://${POSTGRES_USER:-scentra_saas}:${POSTGRES_PASSWORD:-scentra_saas_dev}@db:5432/${POSTGRES_DB:-scentra_saas}}
      SAAS_ENV: ${SAAS_ENV:-local}
      SAAS_JWT_SECRET: ${SAAS_JWT_SECRET:-change-me-local-saas-secret}
      SAAS_JWT_ISSUER: ${SAAS_JWT_ISSUER:-scentra-ai}
      SAAS_WORKER_NAME: ${SAAS_WORKER_NAME:-worker-local}
      SAAS_TRIAL_DAYS: ${SAAS_TRIAL_DAYS:-30}
      SAAS_TRIAL_PLAN_CODE: ${SAAS_TRIAL_PLAN_CODE:-starter}
      SCENTRA_META_ACCESS_TOKEN: ${SCENTRA_META_ACCESS_TOKEN:-}
      SCENTRA_WHATSAPP_BUSINESS_ACCOUNT_ID: ${SCENTRA_WHATSAPP_BUSINESS_ACCOUNT_ID:-}
      SCENTRA_META_GRAPH_VERSION: ${SCENTRA_META_GRAPH_VERSION:-v22.0}
      SCENTRA_META_TIMEOUT_SEC: ${SCENTRA_META_TIMEOUT_SEC:-15}
    command: ["python", "-m", "app_saas.workers.runner"]

volumes:
  pgdata_saas: {}
